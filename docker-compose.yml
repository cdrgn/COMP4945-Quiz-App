services:
  # Oracle Database container
  oracle-db:
    image: gvenzl/oracle-free:slim
    environment:
      ORACLE_PASSWORD: password
    ports:
      - "1522:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # TriviaAPI container
  trivia-api:
    build: .
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Inside Docker, containers connect by service name, not localhost
      ConnectionStrings__DefaultConnection: "User Id=SYSTEM;Password=password;Data Source=oracle-db:1521/FREEPDB1"
    depends_on:
      oracle-db:
        condition: service_healthy

volumes:
  oracle-data:
